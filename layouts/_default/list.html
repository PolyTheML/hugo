{{ define "main" }}
<h1>{{ .Title }}</h1>
<ul class="post-list">
{{ range .Pages }}
    <li>
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <time>{{ .Date.Format "January 2, 2006" }}</time>
        {{ if .Summary }}
        <p>{{ .Summary }}</p>
        {{ end }}
    </li>
{{ end }}
</ul>
{{ end }}

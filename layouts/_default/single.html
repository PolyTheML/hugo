{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "January 2, 2006" }}</time>
    {{ if .Params.tags }}
    <p style="color: #999; font-size: 0.85rem;">
        Tags: {{ range .Params.tags }}<span style="background: #f0f0f0; padding: 2px 8px; border-radius: 3px; margin-right: 5px;">{{ . }}</span>{{ end }}
    </p>
    {{ end }}
    <div>{{ .Content }}</div>
</article>
{{ end }}

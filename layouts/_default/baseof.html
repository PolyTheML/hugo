<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ .Params.description | default .Site.Params.description }}">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
        header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 1.5rem; }
        header h1 a { color: #333; text-decoration: none; }
        header nav { margin-top: 10px; }
        header nav a { color: #666; text-decoration: none; margin-right: 15px; }
        header nav a:hover { color: #000; }
        article { margin-bottom: 40px; }
        article h1 { font-size: 1.8rem; margin-bottom: 10px; }
        article h2 { font-size: 1.3rem; margin-top: 30px; margin-bottom: 10px; }
        article h3 { font-size: 1.1rem; margin-top: 20px; margin-bottom: 8px; }
        article time { color: #999; font-size: 0.9rem; }
        article img { max-width: 100%; height: auto; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        footer { border-top: 2px solid #eee; padding-top: 20px; margin-top: 40px; color: #999; font-size: 0.9rem; }
        a { color: #0066cc; }
        .post-list { list-style: none; padding: 0; }
        .post-list li { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .post-list h2 { margin: 0 0 5px 0; font-size: 1.3rem; }
        .post-list h2 a { color: #333; text-decoration: none; }
        .post-list h2 a:hover { color: #0066cc; }
        .post-list time { color: #999; font-size: 0.85rem; }
        blockquote { border-left: 4px solid #ddd; padding-left: 15px; margin-left: 0; color: #666; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
        pre code { background: none; padding: 0; }
    </style>
    {{ partial "head-additions.html" . }}
</head>
<body>
    <header>
        <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
        <nav>
            <a href="{{ .Site.BaseURL }}">Home</a>
            <a href="{{ "posts" | relURL }}">Posts</a>
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
    </footer>
</body>
</html>
